# Sections for /work-with-me/. Order here is the order on the page and in the TOC.
# 'body' is markdown (inline HTML allowed). 'caveat' renders as an italic aside.
- num: i
  id: research
  title: Research collaboration
  body: >
    I am always interested in exploring new research collaborations at the intersection of
    artificial intelligence and mental health. If your work intersects with ours at the
    [UCSF AI in Mental Health Research Group (AIMHealth)](https://aimhealth.ucsf.edu/), please
    reach out directly at <span class="mono">karthik.sarma (at) ucsf.edu</span> or to the group
    at <span class="mono">aimhealth (at) ucsf.edu</span>.

- num: ii
  id: industry
  title: Academic–industry partnerships
  body: >
    Through UCSF AIMHealth, I am able to facilitate research-based academic–industry partnerships.
    We have worked on clinical trials of digital mental health applications, secondary and
    independent analyses of mental health–related data, and novel discovery science with industry
    partners. If your company is interested in working with us on a relevant clinical trial,
    technology development project, SBIR/STTR (or similar) grant, or other collaboration, please
    contact me directly.

- num: iii
  id: speaking
  title: Speaking engagements
  body: >
    I consider invitations for speaking engagements on topics within my expertise — AI in mental
    health, AI-associated psychosis, clinical informatics, healthcare AI policy, and the regulatory
    environment for AI/SaMD products.


    I generally expect invitations to cover travel (unless remote) and an honorarium, but for
    academic, non-profit, or early-stage ventures I may consider otherwise.

- num: iv
  id: mentorship
  title: Academic mentorship
  body: >
    I am not currently able to take on new primary mentee graduate students or postdocs, but I may
    be able to provide co-mentorship to students mentored by a primary faculty member. For students
    in this position, it may be possible to join one of our ongoing projects or take on one of our
    project opportunities.


    If you are interested in working with me in this capacity, please reach out with a CV and a
    brief description of your research interests and background.

- num: v
  id: consulting
  title: Consulting & expert witness
  body: >
    I maintain a limited industry advisory practice. Engagements typically involve strategic,
    technical, or scientific questions related to my primary expertise. I draw on my work as a
    physician, AI researcher, and technology executive.


    I also accept expert witness engagements focused specifically on the intersection between
    technology and health. I am not currently taking cases that exclusively involve forensic
    psychiatric expertise (i.e., cases without a clear technology-related component).


    Inquiries: <span class="mono">ksarma (at) ksarma.com</span>.
  caveat: >
    I am not currently accepting engagements that relate solely to clinical practice (clinical
    annotation, forensic psychiatry, locums, etc.), nor offers of full-time employment.
